<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:var(--color-background-tertiary);color:var(--color-text-primary);line-height:1.7;}
.hero{background:linear-gradient(135deg,#10243f,#1c3a5e 60%,#234a73);color:#eef3f8;padding:40px 20px 36px;border-bottom:4px solid #c98b3a;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;}
.hero-in{max-width:920px;margin:0 auto;position:relative;z-index:1;}
.eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#e9c896;font-weight:500;margin-bottom:8px;}
.hero h1{font-size:clamp(1.2rem,3.5vw,2rem);font-weight:500;margin-bottom:8px;}
.hero p{font-size:.88rem;color:#cdd9e6;max-width:620px;margin-bottom:16px;}
.badges{display:flex;flex-wrap:wrap;gap:7px;}
.badge{border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:3px 12px;font-size:.75rem;color:#e6edf4;}
.toc{max-width:920px;margin:-20px auto 0;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 18px 20px;position:relative;z-index:2;}
.toc-ttl{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.toc-ttl::after{content:"";flex:1;height:0.5px;background:var(--color-border-tertiary);}
.gnav{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:4px;}
.gnav a{display:flex;align-items:center;justify-content:center;height:38px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);text-decoration:none;color:var(--color-text-primary);font-size:.78rem;font-weight:500;background:var(--color-background-primary);transition:.12s;}
.gnav a:hover{border-color:#5b85ab;background:var(--color-background-secondary);}
.gnav a.s1{border-bottom:2px solid #4a7ba6;}
.gnav a.s2{border-bottom:2px solid #5e8c61;}
.gnav a.s3{border-bottom:2px solid #b07a3e;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:.73rem;color:var(--color-text-secondary);}
.dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.jbar{position:sticky;top:0;z-index:50;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:.78rem;}
.jbar a{color:#4a7ba6;text-decoration:none;font-weight:500;}
.jbar select{font-size:.78rem;padding:3px 6px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);max-width:52vw;}
.jbar .sp{flex:1;}
.sdiv{max-width:920px;margin:36px auto 16px;padding:0 4px;}
.slabel{display:inline-block;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;}
.sdiv.s1 .slabel{background:#4a7ba6;}
.sdiv.s2 .slabel{background:#5e8c61;}
.sdiv.s3 .slabel{background:#b07a3e;}
.sdiv h3{margin:7px 0 3px;font-size:1.08rem;font-weight:500;}
.sdiv p{color:var(--color-text-secondary);font-size:.85rem;}
main{max-width:920px;margin:0 auto;padding:0 10px 80px;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:12px;overflow:hidden;scroll-margin-top:44px;}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-wrap:wrap;cursor:pointer;}
.card-head:hover{background:var(--color-background-tertiary);}
.qn{font-weight:500;font-size:1.1rem;color:#4a7ba6;min-width:50px;}
.card-head h4{margin:0;font-size:.92rem;font-weight:500;flex:1;color:var(--color-text-primary);}
.apill{background:#fff6e4;border:0.5px solid #e9c896;color:#7a4e10;font-weight:500;font-size:.78rem;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.tog{font-size:.72rem;color:#5b85ab;flex-shrink:0;}
.card-body{display:none;padding:14px 16px 16px;}
.card-body.open{display:block;}
.card-body p{font-size:.87rem;color:var(--color-text-secondary);margin-bottom:10px;}
.card-body svg{display:block;width:100%;max-width:680px;margin:0 auto;}
.card-foot{padding:0 16px 10px;font-size:.74rem;color:var(--color-text-secondary);display:flex;justify-content:space-between;}
.bk{text-decoration:none;color:#5b85ab;font-weight:500;}
footer{text-align:center;padding:24px 16px 40px;color:var(--color-text-secondary);font-size:.76rem;border-top:0.5px solid var(--color-border-tertiary);margin-top:28px;}
</style>
</head>

<script>
const QS={1:{t:"浮動小数点演算における計算誤差のメカニズム",a:"エ",s:1,d:"絶対値が極端に異なる数値を加減算すると、値の小さなデータが計算結果に反映されずに失われる「情報落ち」が発生する。多くの数を加算する場合は絶対値の小さいものから順に計算するのが原則。"},2:{t:"条件付き文字列の組合せ論理思考",a:"ア",s:1,d:"0〜9の数字と空白を組み合わせ長さ3の文字列を作る。先頭は数字のみ、空白の後に数字は不可という制約を場合分けして数える：1,000＋100＋10＝1,110通り。"},3:{t:"偶数パリティによるデータ保護とエラー検出",a:"イ",s:1,d:"偶数パリティはデータ全体の「1」の数が偶数になるようパリティビットを付加するエラー検出方式。16進数30, 3F, FAがその条件を満たす。"},4:{t:"アルゴリズムの反復処理と関数の定常状態",a:"エ",s:1,d:"ループ内でx←y、y←f(x)が繰り返され、yの値に変化がなくなる「収束」に達するとf(y)=yが成立する。"},5:{t:"ポインタの動きから読み解くLIFOデータ構造",a:"イ",s:1,d:"f(x)はポインタpをインクリメントしてからデータを格納（Push）、g()はpの位置からデータを取り出してからデクリメント（Pop）する。LIFO形式＝スタック構造。"},6:{t:"ハッシュ値の計算とデータの衝突（シノニム）",a:"イ",s:1,d:"文字列のアルファベット順位の総和を27で割った余りがハッシュ値。SEPは19+5+16=40、FEBは6+5+2=13。それぞれmod27=13と13で一致→衝突（シノニム）が発生。"},7:{t:"並行処理を支えるモジュールの再入可能性",a:"イ",s:1,d:"複数タスクから同時に呼び出されても互いに干渉せず正しい結果を返す性質を「再入可能（リエントラント）」という。局所変数をタスクごとの独立メモリに保持する構造が必要。"},8:{t:"漏れ電流を防ぐプロセッサの省電力技術",a:"ウ",s:1,d:"パワーゲーティングは使用していない回路ブロックへの電源供給をスイッチで遮断する省電力技術。クロック停止だけでは防げないリーク電流を根本から削減する。"},9:{t:"アクセス速度に基づく記憶装置の階層構造",a:"イ",s:1,d:"記憶装置はCPUに近いほど高速・小容量。演算器が直接読み書きする「レジスタ」が最速。次いでキャッシュ→主記憶（RAM）→補助記憶（SSD/HDD）の順。"},10:{t:"磁気ディスク（HDD）のアクセス時間の構成要素",a:"ア",s:1,d:"HDDアクセス時間＝シークタイム（ヘッド移動）＋サーチタイム（回転待ち）＋データ転送時間。回転速度を上げるかシーク時間を短縮すれば高速化できる。"},11:{t:"分散システムにおける「アクセス透過性」",a:"ア",s:1,d:"アクセス透過性は、ローカルとリモートのデータに対し差異を意識せず同一の手順でアクセスできる性質。遠隔の資源を手元と同じ操作で利用できる。"},12:{t:"システム処理能力の指標：スループット",a:"ア",s:1,d:"スループットは単位時間当たりに処理・伝送できる仕事量の指標。単一処理の速さ（レスポンスタイム）とは異なるマクロな指標。"},13:{t:"空き状況に応じたジョブのスケジューリング",a:"ア",s:1,d:"処理時間[5,12,4,3,10,4]分を3台のプロセッサA・B・Cに空いた順に割り当てる。結果：A=5+10=15分、B=12分、C=4+4+3=11分。最も多いのはA。"},14:{t:"ホワイトボックステストと網羅率の測定",a:"エ",s:1,d:"ホワイトボックステストは内部論理パスが設計通り動くかを確認。実行された命令・分岐の割合（網羅率）を測定するには「テストカバレッジ分析ツール」を使用する。"},15:{t:"ビッグデータを支えるHadoopの役割",a:"エ",s:1,d:"Hadoopはペタバイト級データを多数のコモディティサーバーで並列・分散処理するOSSフレームワーク。HDFS（分散ファイルシステム）とMapReduceで構成される。"},16:{t:"論理回路から「一致回路（XNOR）」を見抜く",a:"ウ",s:1,d:"XとYが同じとき（0,0 or 1,1）に1を出力するXNOR（一致）回路。正解の回路ウは「X AND Y」と「(NOT X) AND (NOT Y)」をORで結合した構成。"},17:{t:"多様なユーザーに寄り添うWebアクセシビリティ",a:"ウ",s:1,d:"Webアクセシビリティは高齢者や障がい者を含め誰もがWeb情報を利用できる設計。色覚特性への配慮として、色だけでなくテキストラベルで必須項目を明示する。"},18:{t:"NoSQLの要、キーバリューストア（KVS）",a:"エ",s:1,d:"KVSはデータを「キー（識別子）」と「バリュー（値）」のペアだけで管理するNoSQLの一種。複雑な表構造を持たず超高速な分散配置が可能。"},19:{t:"リレーショナルDBにおける主キーの絶対制約",a:"ウ",s:1,d:"主キーの2つの絶対ルール：①重複不可（一意性制約）、②NULL不可（非NULL制約）。同じ主キー値を持つ行が複数存在することはない。"},20:{t:"データベース権限の制御（DCL）と堅牢性",a:"エ",s:1,d:"特定ユーザーに検索・更新権限を付与するSQL命令が「GRANT文」。DCL（データ制御言語）によるアクセス制御がシステム全体の堅牢性を守る。"},21:{t:"データベースのビュー",a:"イ",s:2,d:"ビューは実表から特定データを抽出した「仮想的な表」。物理データを持たず、機密情報を隠蔽し必要な列・行のみを公開するアクセス制御として機能する。"},22:{t:"ロックの両立性",a:"イ",s:2,d:"共有ロック同士は両立する（複数読込み可）。専有ロックは他のいかなるロックとも両立しない（排他制御）。T1が共有ロック中、T2は共有ロック可・専有ロック不可。"},23:{t:"回線利用率の計算",a:"ウ",s:2,d:"1件2,000Bの伝票を2件まとめ400Bヘッダ付加→1送信=4,400B=35,200bit。1時間100,000件→50,000送信/h。回線速度1Mbps=3,600Mbit/h。利用率≈49%。"},24:{t:"レイヤ2スイッチ",a:"イ",s:2,d:"L2スイッチはMACアドレステーブルを持ち、宛先MACが存在するポートにのみフレームを転送する。HUBの全ポートブロードキャストと異なりネットワーク負荷を大幅削減。"},25:{t:"サブネットマスク",a:"イ",s:2,d:"255.255.255.240（/28）ではサブネット範囲16個ずつ区切り。192.168.1.17（16〜31のブロック）と192.168.1.29（同ブロック）は同一サブネット。"},26:{t:"電子メールのプロトコル",a:"エ",s:2,d:"送信・サーバ間リレーはSMTP。受信・閲覧はIMAP4（サーバ同期管理）またはPOP3（ダウンロード型）。メール受信確認には主にIMAP4を使用する。"},27:{t:"DDoS / DNSリフレクタ攻撃",a:"ア",s:2,d:"攻撃者は送信元IPを標的のIPに偽装し、公開DNSへ小さなクエリを大量送信。DNSは巨大な応答を標的へ集中的に送り返す（リフレクタ攻撃・アンプ攻撃）。"},28:{t:"共通鍵暗号方式",a:"ウ",s:2,d:"暗号化と復号に同じ鍵を使う方式。公開鍵暗号（RSA等）と比べ計算がシンプルで処理速度が圧倒的に速く、大容量データの暗号化に適する。"},29:{t:"XML署名",a:"ウ",s:2,d:"XML署名はXML文書の階層構造ごとに署名処理が行える規格。文書全体への署名だけでなく、特定セクションへの部分署名や多重署名にも対応する。"},30:{t:"耐タンパ性",a:"ウ",s:2,d:"耐タンパ性は不正解析・改ざんを防ぐ性質。IoTデバイスに光検知回路を組み込み、ケースが開けられたときに内蔵メモリの秘密情報を自動消去できる。"},31:{t:"フォールスネガティブ（偽陰性）",a:"ウ",s:2,d:"フォールスネガティブ（False Negative）は誤って安全と判断しスルーする状態。マルウェア感染ファイルを「感染していない」と判断する最も致命的な検知漏れ。"},32:{t:"情報漏えい対策",a:"エ",s:2,d:"ノートPCのストレージを暗号化することで、盗難・紛失時でも復号鍵なしにデータを読み取ることを物理的・論理的に不可能にする。"},33:{t:"ハニーポット",a:"ウ",s:2,d:"ハニーポットは侵入者やマルウェアの挙動を調査するために意図的に脆弱性を持たせたシステム。攻撃者を誘い込み攻撃手口を安全な環境で観察する。"},34:{t:"シーケンス図（UML）",a:"ウ",s:2,d:"シーケンス図はオブジェクト間のメッセージやり取りを時系列で表すUML図。縦軸が時間の経過、横軸がオブジェクトの生存線（ライフライン）。"},35:{t:"継承（オブジェクト指向）",a:"ウ",s:2,d:"継承はOOPの三大要素の一つ。親クラスの属性・メソッドを子クラスが引き継ぐ仕組み。コードの再利用性・保守性が飛躍的に高まる。"},36:{t:"状態遷移図",a:"イ",s:2,d:"状態遷移図はイベントをきっかけに「状態」が変化する様子を表す図（UMLのステートマシン図）。自動販売機のロジック設計など組み込みシステムで特に重要。"},37:{t:"ブラックボックステスト",a:"イ",s:2,d:"内部構造を一切考慮せず、機能仕様・インタフェース仕様に基づいてテストケースを設計する手法。「入力→正しい出力」を検証する。"},38:{t:"スタブ（テスト用ダミーモジュール）",a:"ウ",s:2,d:"トップダウンテストで使うダミーの下位モジュール。下位モジュールが未完成でも固定の戻り値を返すスタブを使って上位モジュールのテストを進められる。"},39:{t:"スクラム（アジャイル開発）",a:"ウ",s:2,d:"スクラムは役割（プロダクトオーナー等）・イベント（スプリントレビュー等）・作成物（プロダクトバックログ等）・ルールで構成されるアジャイルフレームワーク。"},40:{t:"ペアプログラミング（XP）",a:"ウ",s:2,d:"XPの代表的プラクティス。2人が1台のPCを共有し、コードを書く「ドライバ」とレビュー・指示する「ナビゲータ」の役割を交代しながら開発する。"},41:{t:"コンティンジェンシ計画",a:"ア",s:3,d:"リスクが現実化した際に被害を最小限に抑え迅速に復旧するための「プランB」。あらかじめ特定条件下でのみ実行する対応策を決定しておく。"},42:{t:"ガントチャート",a:"ウ",s:3,d:"横軸に時間・縦軸にタスクを配置し、計画（予定）と実績を視覚的に比較するプロジェクト管理ツール。作業の開始・終了・進捗・仕掛かりを一覧で把握できる。"},43:{t:"傾向分析（容量・能力管理）",a:"ア",s:3,d:"過去から現在までのリソース使用量の履歴データを分析し、将来どの時点でリソースが枯渇するかを予測する手法。事前投資の判断に活用する。"},44:{t:"サービス稼働率の計算",a:"エ",s:3,d:"稼働率は「合意されたサービス提供時間」が基準。提供時間7:00〜19:00（12h）、サービス時間内の停止16:00〜19:00（3h）。稼働率=(12-3)÷12=75%。"},45:{t:"システム監査の独立性",a:"エ",s:3,d:"監査の絶対条件は客観性。自部門や開発・運用に関与した者が監査すると利益相反が生じる。利害関係のない外部システム監査人を内部監査人に位置付けることが正解。"},46:{t:"戦略マネジメント",a:"ウ",s:3,d:"戦略マネジメントは全社規模でのIT投資評価方法やポートフォリオ選択基準を決定する「全社最適」の視点。プロジェクトマネジメントの「個別最適・実行管理」とは異なる。"},47:{t:"バランススコアカード（BSC）学習と成長の視点",a:"ウ",s:3,d:"BSCの「学習と成長」は財務・顧客・内部プロセスを支える土台。ITコンサルに重点を置くため社内要員30名をITプロフェッショナルとして育成するのがKPI目標の例。"},48:{t:"グリーン調達",a:"エ",s:3,d:"品質や価格の要件を満たすだけでなく環境負荷が小さい製品・サービスを優先して購入する取り組み。CSR・ESG経営の一環。"},49:{t:"ベンチマーキング",a:"イ",s:3,d:"競合や先進企業と自社の製品・サービス・オペレーションを定性的・定量的に比較し、パフォーマンスギャップを測定して業務を改善する手法。"},50:{t:"コンバージョン率",a:"イ",s:3,d:"サイト訪問者のうち最終目標（購入・登録等）を達成した人数の割合を示す最重要KPI。ショッピングサイトの効果を直接示す指標。"},51:{t:"SFA（営業支援システム）",a:"ア",s:3,d:"営業活動にITを活用して効率と品質を高めるシステム。顧客情報・商談進捗・担当者スケジュールを一元管理し、組織的・データドリブンな営業を実現する。"},52:{t:"コンカレントエンジニアリング",a:"イ",s:3,d:"製品開発において設計・生産計画等の工程を同時並行的に行う手法。設計完了を待たずに次工程をオーバーラップさせ、市場投入期間（TTM）を短縮する。"},53:{t:"XBRL（財務データの国際標準）",a:"イ",s:3,d:"財務・経営・投資等の事業報告の作成・交換・比較に使うXMLベースのコンピュータ言語。財務情報にタグを付与しコンピュータが自動処理できるようにする。"},54:{t:"MRP（資材所要量計画）",a:"エ",s:3,d:"基準生産計画と手持在庫を基に部品の手配数量を算出するシステム。完成品の計画から逆算し、BOM（部品構成表）と在庫を照合して発注量・タイミングを自動計算する。"},55:{t:"RFID（ICタグ）",a:"エ",s:3,d:"電波でタグデータを非接触読み書きする技術。汚れに強く梱包の外から読取可能。見通し線不要で箱内の複数商品を一括読取できるため検品・棚卸の効率が飛躍的に向上する。"},56:{t:"M&A（企業の合併・買収）",a:"イ",s:3,d:"自社にない技術・ノウハウを獲得し新規事業を短期間で実現できるのがM&Aの主な利点。ゼロから開発するより既存の市場実績を持つ企業・技術を獲得する戦略。"},57:{t:"ABC分析（パレート法則）",a:"ウ",s:3,d:"総売上800千円の70%＝560千円。上位から累積：a180+b140+c120+d100=540（不足）→e80を加え620→5品目で70%超。最小品目数は5。"},58:{t:"散布図と相関関係",a:"エ",s:3,d:"散布図でxが増えるとyが減る傾向（右下がり）が明確→「負の相関」。xとyの相関係数は負の値（−1に近いほど強い負の相関）。"},59:{t:"先入先出法（FIFO）による払出単価",a:"イ",s:3,d:"4/10に3,000個出庫。FIFO順：4/1在庫2,000個×100円=200,000円、4/5在庫1,000個×130円=130,000円。合計330,000円÷3,000個=110円/個。"},60:{t:"サイバーセキュリティ戦略本部の設置機関",a:"エ",s:3,d:"サイバーセキュリティ基本法によりサイバーセキュリティ戦略本部は「内閣」に設置。省庁横断的対応と迅速な意思決定を可能にする行政最高機関への設置が適切。"}};
function sw(c,h){return `<svg viewBox="0 0 680 ${h}" xmlns="http://www.w3.org/2000/svg" style="font-family:'Hiragino Sans','Yu Gothic',sans-serif">${c}</svg>`;}
function R(x,y,w,h,f,st,r){return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r||5}" fill="${f}" stroke="${st||'#5b85ab'}" stroke-width="1.2"/>`;}
function T(x,y,s,f,a,sz,fw){return `<text x="${x}" y="${y}" text-anchor="${a||'middle'}" fill="${f||'#1f2a33'}" font-size="${sz||12}" font-weight="${fw||'normal'}">${s}</text>`;}
const DF=`<defs><marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><polygon points="0,0 5,3 0,6" fill="#5b85ab"/></marker><marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><polygon points="0,0 5,3 0,6" fill="#c98b3a"/></marker></defs>`;
const DIAGS={
