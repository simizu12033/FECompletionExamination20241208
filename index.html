  <script>
  const q = [
    [1,"基礎理論","多数の実数を加算するとき、絶対値の小さい順に計算する理由","エ","情報落ちを抑える方法。非常に大きい数へ小さい数を足すと、小さい数が仮数部の桁外に追い出されることがある。小さい値同士を先にまとめれば、有効桁を保ちやすい。","アンダフローは絶対値が小さすぎる場合、打切り誤差は反復計算の打切り、けた落ちは近い値の減算で有効桁が失われる現象。"],
    [2,"基礎理論","数字と空白を使う長さ3の文字列の個数","ア","空白なしは10×10×10=1,000通り。3文字目だけ空白は10×10=100通り。2文字目が空白なら、その後に数字は置けないので3文字目も空白となり10通り。合計1,110通り。","制約を場合分けし、重複や禁止パターンを混ぜない。"],
    [3,"基礎理論","7ビット文字コードに偶数パリティを付加","イ","1の個数が偶数になるよう先頭ビットを決める。30は1が2個なので30、3Fは6個なので3F、7Aは5個なので先頭を1にしてFA。","16進数を8ビットの2進数に直して1を数える。"],
    [4,"アルゴリズム","反復で値が変化しなくなったときの関係式","エ","反復は x←y の後に y←f(x) を計算する。収束後は新しいyと直前のyが等しいので、固定点の条件 f(y)=y が成立する。","反復法の収束先は関数の固定点。"],
    [5,"アルゴリズム","配列末尾へ追加し、末尾から取り出すデータ構造","イ","fはポインタを増やして追加し、gは最後に追加した要素を取り出してポインタを減らす。後入れ先出し（LIFO）なのでスタック。","キューは先入れ先出し（FIFO）。"],
    [6,"アルゴリズム","文字順位の総和 mod 27 のハッシュ衝突","イ","SEPは19+5+16=40、40 mod 27=13。FEBは6+5+2=13で同じハッシュ値になる。","ハッシュ衝突は異なるキーが同じ値になること。"],
    [7,"ソフトウェア","複数タスクから同時・並行に実行できる性質","イ","実行中に別タスクから再び呼び出しても正しく動く性質は再入可能（リエントラント）。共有する書換え可能データを持たないなどの設計が必要。","再使用可能は再ロードせず使える性質で、同時実行可能とは限らない。"],
    [8,"ハードウェア","パワーゲーティングの説明","ウ","使用していない回路ブロックへの電源供給を遮断し、漏れ電流を含む消費電力を抑える技術。","クロック停止はクロックゲーティング、電圧・周波数変更はDVFS。"],
    [9,"ハードウェア","アクセス時間が最も短い記憶装置","イ","CPUレジスタは演算装置に最も近く、通常はキャッシュ、主記憶、磁気ディスクより高速。","記憶階層は一般に、レジスタ→キャッシュ→主記憶→補助記憶。"],
    [10,"ハードウェア","磁気ディスク装置の性能","ア","アクセス時間は主にシーク時間、回転待ち時間、転送時間からなる。回転速度を上げると回転待ちが短くなり、位置決め時間を短縮するとシークが短くなる。","容量は面数・トラック数・セクタ数などで決まり、転送速度は回転速度と記録密度に関係する。"],
    [11,"システム","分散処理システムのアクセス透過性","ア","遠隔資源を、場所や遠隔側の処理方式を意識せず、手元の資源と同様の操作で利用できること。","場所・移動・複製・障害などを利用者から隠す考え方を透過性という。"],
    [12,"システム","単位時間当たりに処理される仕事量","ア","スループットは一定時間内に完了できる処理量。","ターンアラウンドタイムは投入から完了まで、レスポンスタイムは要求から応答まで。"],
    [13,"システム","3台のプリンタへ空き順に割り当てた総処理時間","ア","時系列に割り当てると、Aは5分の後に10分で計15分、Bは12分、Cは4+3+4=11分。長い順はA、B、C。","各装置の終了時刻を更新する簡単な表を作ると確実。"],
    [14,"ソフトウェア","実行された部分の割合を測るホワイトボックス用ツール","エ","命令網羅、分岐網羅などのテストカバレージを測定するのはテストカバレージ分析ツール。","静的解析は実行せずソースを調べる。"],
    [15,"ソフトウェア","Hadoopの説明","エ","大規模データを複数ノードで分散保存・分散処理するためのソフトウェア群。代表要素はHDFSやMapReduce。","RDBMSやWebサーバ、Java EEアプリケーションサーバではない。"],
    [16,"基礎理論","入力XとYが同じときだけ1となる論理回路","ウ","求めるのはXNOR（論理一致）で、XY + ¬X¬Y。選択肢ウはNANDだけでこの式を構成している。","真理値表で00と11だけ1になるかを確認する。"],
    [17,"ソフトウェア","アクセシビリティを高めるWebページ設計","ウ","必須項目を色だけで示すと色を識別しにくい利用者へ伝わらない。文字でも「必須」と明示する。","自動音声再生や表組みによるレイアウトは利用を妨げる場合がある。altには画像の意味を記述する。"],
    [18,"データベース","キーバリューストアの説明","エ","一意なキーと、それに対応する任意の値を組にして保存する。単純な構造で水平分散しやすい。","アはグラフDB、イはドキュメントDB、ウは関係DB。"],
    [19,"データベース","関係データベースの主キーの性質","ウ","同じ表の中で主キー値が重複する行は存在できない。さらにNULLにもできない。","複数列からなる複合主キーも作れる。主キー以外の列でも検索できる。"],
    [20,"データベース","特定利用者に表の更新権限を与えるSQL","エ","GRANT文でUPDATEなどの権限を利用者やロールへ付与する。","CONNECTは接続、参照制約は整合性、ASSERTIONは一般制約の定義。"],
    [21,"データベース","ビューを利用する目的","イ","行や列を限定したビューだけを利用者に公開すれば、基表の機密部分を隠せる。","ビューは論理的な見え方を提供する。物理的データ独立性はDBMS全体の機能。"],
    [22,"データベース","共有ロックと専有ロックの両立性","イ","共有ロック同士は共存できるが、共有ロック中の資源に他トランザクションが専有ロックを取ることはできない。","専有ロックは他の共有・専有ロックのどちらとも両立しない。"],
    [23,"ネットワーク","専用線の回線利用率","ウ","2件単位なので1時間に50,000ブロック。1ブロックは2,000×2+400=4,400バイト。送信量は220,000,000バイト=1,760Mビット/時。1Mビット/秒の回線容量は3,600Mビット/時なので約48.9%、約49%。","単位をバイトからビットへ直す際に8倍する。"],
    [24,"ネットワーク","レイヤ2スイッチの特徴","イ","学習したMACアドレス表を参照し、宛先MACがあるLANポートだけにフレームを転送する。","IP割当てはDHCP、全ポート転送はリピータハブ的動作、IPフラグメントはネットワーク層。"],
    [25,"ネットワーク","255.255.255.240で同一サブネットの組合せ","イ","/28なので1ブロック16アドレス。192.168.1.17と.29はどちらも16～31のブロックに属する。","境界は0、16、32、48…と16刻み。"],
    [26,"ネットワーク","電子メールの送信・受信プロトコル","エ","送信にはSMTP、メールサーバ上のメールを管理・受信する方式にはIMAP4を使用する。","POP3も受信に使うが、選択肢の正しい組合せはSMTP＋IMAP4。"],
    [27,"セキュリティ","UDPの性質を悪用したDDoS攻撃","ア","DNSリフレクタ攻撃は送信元IPを被害者に偽装したUDP要求を多数のDNSサーバへ送り、増幅した応答を被害者へ集中させる。","他の選択肢はWebや認証に対する攻撃で、UDP反射・増幅とは異なる。"],
    [28,"セキュリティ","共通鍵暗号方式の特徴","ウ","同程度の安全性なら公開鍵暗号より処理が高速で、大量データの暗号化に向く。","鍵共有が必要だが平文送付は不可。1対1では通常1個の共通鍵を共有する。鍵ペアは公開鍵方式。"],
    [29,"セキュリティ","XML署名で実現できること","ウ","文書全体だけでなく一部分への署名、複数署名、入れ子署名など、XML構造を利用した柔軟な署名ができる。","XML署名は暗号化やAjax、ステガノグラフィそのものではない。"],
    [30,"セキュリティ","IoTデバイスの耐タンパ性","ウ","ケース開封を光センサで検知し、秘密情報を消去する仕組みは、物理的解析や改ざんに抵抗する耐タンパ技術。","暗号化は通信保護、GPSは追跡、予備機交換は可用性対策。"],
    [31,"セキュリティ","フォールスネガティブ","ウ","実際には感染しているのに「感染していない」と判定する偽陰性。危険なものを見逃す誤り。","フォールスポジティブは安全なものを危険と誤検知する。"],
    [32,"セキュリティ","情報漏えい対策","エ","ノートPCのストレージ暗号化は、紛失・盗難時に保存データを読み取られるリスクを低減する。","チェックサムは誤り検出、ミラーリングと遠隔バックアップは主に可用性対策。"],
    [33,"セキュリティ","攻撃者の挙動を調査するため意図的に脆弱にしたシステム","ウ","ハニーポットは攻撃を誘引・観察するおとりシステム。攻撃手法やマルウェアの活動分析に使う。","DMZは境界ネットワーク、SIEMはログ統合分析、ボットネットは侵害端末群。"],
    [34,"ソフトウェア","オブジェクト間の相互作用を時系列に表すUML図","ウ","シーケンス図はオブジェクトのライフラインとメッセージを時間順に示す。","状態遷移図は一つの対象の状態変化、アクティビティ図は処理フロー。"],
    [35,"ソフトウェア","クラスの属性や機能をサブクラスで利用する仕組み","ウ","継承では上位クラスの属性・操作を下位クラスへ引き継げる。","オーバーライドは継承した操作の再定義、カプセル化は内部の隠蔽、多相性は同じ呼出しで異なる動作。"],
    [36,"ソフトウェア","状態遷移図の説明","イ","状態を変化させるイベントと、遷移に伴って実行される動作を表す。","アは構造図、ウは機能階層、エはDFDの説明。"],
    [37,"ソフトウェア","ブラックボックステストのテストケース設計","イ","内部構造ではなく、機能仕様やインタフェース仕様から入力と期待結果を設計する。","処理手順、ソース、全分岐の真偽を基にする方法はホワイトボックステスト。"],
    [38,"ソフトウェア","トップダウン結合テストで下位モジュールを代替","ウ","上位からテストすると、未完成の下位モジュールの代わりにスタブを使う。","ボトムアップでは上位を代替するドライバを使う。"],
    [39,"ソフトウェア","スクラムの説明","ウ","スクラムはプロダクトオーナー等の役割、スプリントレビュー等のイベント、プロダクトバックログ等の作成物、ルールで構成される。","アはXP、イは別のライフサイクル、エはフィーチャ駆動開発の説明。"],
    [40,"ソフトウェア","XPで提唱されるプラクティス","ウ","ペアプログラミングはXPの代表的プラクティス。2人でレビューしながら実装し、知識共有と品質向上を図る。","構造化設計やユースケースはXP固有ではない。"],
    [41,"プロジェクト管理","コンティンジェンシ計画で決定すること","ア","特定のリスク条件が発生したときだけ実行する、あらかじめ定義した対応策を決める。","資源、品質要求、コミュニケーションは別のマネジメント計画の対象。"],
    [42,"プロジェクト管理","ガントチャートの特徴","ウ","各作業を横棒で表し、開始・終了の予定と実績、進行中の作業を時系列で把握できる。","順序関係や余裕はPERT、重要ポイントはマイルストーン、出来高と費用はEVMが得意。"],

    return d[id]?d[id]():"";
  }
  function bind(){
    document.querySelectorAll(".card-head").forEach(h=>{
      const toggle=()=>h.parentElement.classList.toggle("open");
      h.onclick=toggle; h.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle()}};
    });
    document.querySelectorAll(".check input").forEach(c=>c.onchange=()=>{
      const id=+c.dataset.id;c.checked?learned.add(id):learned.delete(id);
      localStorage.setItem("fe-learned",JSON.stringify([...learned]));updateProgress();
    });
  }
  function filter(){
    const s=document.querySelector("#search").value.toLowerCase(), c=cat.value;
    document.querySelectorAll(".card").forEach(el=>el.classList.toggle("hidden",!!((s&&!el.dataset.text.includes(s))||(c&&el.dataset.cat!==c))));
  }
  function updateProgress(){document.querySelector("#progress").textContent=`${learned.size} / 60`}
  document.querySelector("#search").oninput=filter;cat.onchange=filter;
  document.querySelector("#openAll").onclick=()=>document.querySelectorAll(".card:not(.hidden)").forEach(x=>x.classList.add("open"));
  document.querySelector("#closeAll").onclick=()=>document.querySelectorAll(".card").forEach(x=>x.classList.remove("open"));
  document.querySelector("#reset").onclick=()=>{if(confirm("学習済みのチェックをすべて消しますか？")){learned.clear();localStorage.removeItem("fe-learned");render()}};
  render();
  </script>
</body>
</html>
